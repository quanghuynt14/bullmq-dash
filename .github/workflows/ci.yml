name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        # --ignore-scripts blocks transitive postinstall on PR builds. CI
        # runs with `contents: read` and `persist-credentials: false`, so a
        # malicious postinstall can't push or mint provenance — but it can
        # still poison the runner cache or tamper with the working tree
        # before security:verify-package packs it. Bun's own build runs
        # explicitly via `bun run build` / `bun run typecheck`, so install-
        # time lifecycle scripts aren't needed here either.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Verify source-control policy
        run: bun run security:verify-source-control

      - name: Verify lockfile policy
        run: bun run security:verify-lockfile

      - name: Verify workflow policy
        run: bun run security:verify-workflows

      - name: Test
        run: bun test

      - name: Verify package contents
        run: bun run security:verify-package
