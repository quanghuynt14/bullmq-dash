name: Publish to npm

on:
  release:
    types: [published]

# One publish at a time per ref. Re-running a release (manual re-trigger, a
# fast follow-up tag) would otherwise race the registry and leave a half-
# attested provenance trail. cancel-in-progress: false because aborting a
# publish mid-flight is worse than waiting.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Don't leave GITHUB_TOKEN in .git/config for downstream steps
          # (including any transitive postinstall) to read. We never push
          # from this workflow.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        # --ignore-scripts blocks transitive postinstall in the privileged
        # publish job (which holds id-token: write + NPM_TOKEN). The project's
        # own build runs explicitly via the prepack hook in package.json
        # (`await import("../build.ts")`), so we don't need install-time
        # lifecycle scripts here. CI runs without this flag because that
        # path doesn't carry publish privileges.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Verify source-control policy
        run: bun run security:verify-source-control

      - name: Verify lockfile policy
        run: bun run security:verify-lockfile

      - name: Verify workflow policy
        run: bun run security:verify-workflows

      - name: Test
        run: bun test

      - name: Verify package contents
        run: bun run security:verify-package

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Install Socket CLI
        run: npm install --global @socketsecurity/cli@1.1.94

      - name: Score published package with Socket
        env:
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        # The score gate compares Socket's alerts against the accepted-alert
        # allowlist in scripts/socket-score.ts. Inherent capability alerts
        # (networkAccess, urlStrings, etc.), Socket's transient
        # recentlyPublished window, and the bullmq/@opentui/core transitive
        # alert set are all accepted; the gate only fails on alert types
        # outside that set. We retry only on exit code 75 (EX_TEMPFAIL),
        # which scripts/socket-score.ts uses for transient lookup failures
        # (Socket hasn't indexed the new version yet). A real gate failure
        # exits 1 and surfaces immediately without burning the retry budget.
        run: |
          for attempt in 1 2 3 4 5; do
            set +e
            bun run security:score
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if [ "$status" -ne 75 ]; then
              echo "Socket score gate failed with exit ${status} (not a transient lookup failure); not retrying."
              exit "$status"
            fi
            echo "Socket score attempt ${attempt} hit a transient lookup failure; waiting for npm registry propagation..."
            sleep 15
          done
          echo "Socket score still unavailable after 5 attempts; failing the publish gate."
          exit 1
