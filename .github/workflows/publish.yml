name: Publish to npm

on:
  release:
    types: [published]

# One publish at a time per ref. Re-running a release (manual re-trigger, a
# fast follow-up tag) would otherwise race the registry and leave a half-
# attested provenance trail. cancel-in-progress: false because aborting a
# publish mid-flight is worse than waiting.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Don't leave GITHUB_TOKEN in .git/config for downstream steps
          # (including any transitive postinstall) to read. We never push
          # from this workflow.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        # --ignore-scripts blocks transitive postinstall in the privileged
        # publish job (which holds id-token: write). The project's
        # own build runs explicitly via the prepack hook in package.json
        # (`await import("../build.ts")`), so we don't need install-time
        # lifecycle scripts here. CI runs without this flag because that
        # path doesn't carry publish privileges.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Verify source-control policy
        run: bun run security:verify-source-control

      - name: Verify lockfile policy
        run: bun run security:verify-lockfile

      - name: Verify workflow policy
        run: bun run security:verify-workflows

      - name: Test
        run: bun test

      - name: Verify package contents
        run: bun run security:verify-package

      - name: Publish with provenance
        run: npm publish --provenance --access public
