name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Verify source-control policy
        run: bun run security:verify-source-control

      - name: Verify lockfile policy
        run: bun run security:verify-lockfile

      - name: Verify workflow policy
        run: bun run security:verify-workflows

      - name: Test
        run: bun test

      - name: Verify package contents
        run: bun run security:verify-package

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Install Socket CLI
        run: npm install --global @socketsecurity/cli@1.1.94

      - name: Score published package with Socket
        env:
          SOCKET_CLI_API_TOKEN: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        # The score gate compares Socket's alerts against the accepted-alert
        # allowlist in scripts/socket-score.ts. Inherent capability alerts
        # (networkAccess, urlStrings, etc.), Socket's transient
        # recentlyPublished window, and the bullmq/@opentui/core transitive
        # alert set are all accepted; the gate only fails on alert types
        # outside that set. The retry loop handles npm registry propagation
        # for fresh publishes — score lookup itself can fail until Socket has
        # seen the new version, but recentlyPublished is now non-blocking.
        run: |
          for attempt in 1 2 3 4 5; do
            if bun run security:score; then
              exit 0
            fi
            echo "Socket score attempt ${attempt} failed; waiting for npm registry propagation..."
            sleep 15
          done

          bun run security:score
